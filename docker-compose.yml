services:
  db:
    image: postgres:16-alpine
    container_name: restoran_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: restoran
      POSTGRES_PASSWORD: restoran
      POSTGRES_DB: restoran
    ports:
      - "5433:5432"
    volumes:
      - restoran_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restoran"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  restoran_pgdata:
